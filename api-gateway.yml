spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      routes:
        - id: order-service
          uri: lb://ORDER-SERVICE
          predicates:
            - Path=/orders/**
          filters:
            - name: LoggingOrdersFilter
            - name: Authentication
              args:
                enabled: true

#            - name: Authorization
#              args:
#                allowedRoles:
#                  - ADMIN
#                  - SUPERADMIN

        - id: inventory-service
          uri: lb://INVENTORY-SERVICE
          predicates:
            - Path=/inventory/**
          filters:
            - name: Authentication
              args:
                enabled: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka

jwt:
  secretKey: "asdfkasdf89as7dfasd9fyuakjshdfa87sdf8iasuhfjas9d8f7as8idfuhjasd89f7asdi8fu"

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

  tracing:
    enabled: true
    sampling:
      probability: 1.0

  zipkin:
    tracing:
      baseUrl: http://localhost:9411/api/v2/spans
