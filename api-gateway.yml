
spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      routes:
        - id: order-service
          uri: lb://ORDER-SERVICE
          predicates:
            - Path=/orders/**
          filters:
            - name: LoggingOrdersFilter

            - name: Authentication
              args:
                enabled: true

#            - name: Authorization
#              args:
#                allowedRoles:
#                  - ADMIN
#                  - SUPERADMIN

        - id: inventory-service
          uri: lb://INVENTORY-SERVICE
          predicates:
            - Path=/inventory/**
          filters:
            - name: Authentication
              args:
                enabled: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka

